        function createCard(item, container) {
            const card = document.createElement('div');
            card.className = 'game-card';
            if(item.id) card.id = item.id;
            
            let extraClasses = '';
            if (item.zoomOut) extraClasses += ' zoom-out-img';

            let media = `<div class="img-container${extraClasses}">`;
            // If the image fails to load, we make it transparent to reveal the container's solid black background
            media += `<img src="${item.img}" onerror="this.style.opacity='0';">`;
            media += `</div>`;
            media += `<span>${item.name}</span>`;
            
            card.innerHTML = media;

            if (item.options) {
                const drop = document.createElement('div');
                drop.className = 'dropdown-menu';
                item.options.forEach(o => {
                    const div = document.createElement('div');
                    div.className = 'dropdown-item';
                    div.innerText = o.name;
                    div.onclick = (e) => { e.stopPropagation(); run(o.url, `${item.name} - ${o.name}`); };
                    drop.appendChild(div);
                });
                card.appendChild(drop);
            }

            card.onclick = (e) => {
                e.stopPropagation();
                if (item.options) {
                    const isActive = card.classList.contains('active-dropdown');
                    document.querySelectorAll('.game-card').forEach(c => c.classList.remove('active-dropdown'));
                    if (!isActive) card.classList.add('active-dropdown');
                } else run(item.url, item.name);
            };
            container.appendChild(card);
        }

        function run(url, title = "System") {
            const overlay = document.getElementById('blank-overlay');
            const frame = document.getElementById('overlay-frame');
            const titleEl = document.getElementById('active-title');
            
            currentActiveUrl = url; // Update trackable URL

            overlay.classList.add('active');
            titleEl.innerText = title;
            
            // Apply sandboxing globally to block any popup/new tab creation
            frame.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-pointer-lock allow-modals');
            
            frame.src = url;

            frame.onload = () => {
                frame.focus();
                window.focus();
                frame.contentWindow.focus();
            };
        }

        function closeOverlay() {
            document.getElementById('blank-overlay').classList.remove('active');
            document.getElementById('overlay-frame').src = "about:blank";
            document.getElementById('overlay-frame').removeAttribute('sandbox');
            currentActiveUrl = "";
        }

        function toggleMinimize() {
            document.getElementById('blank-overlay').classList.toggle('minimized');
            document.getElementById('minimize-btn').innerText = document.getElementById('blank-overlay').classList.contains('minimized') ? "Expand" : "Minimize";
        }

        function toggleFullscreen() {
            const overlay = document.getElementById('blank-overlay');
            if (!document.fullscreenElement) {
                overlay.requestFullscreen().catch(err => {
                    console.error(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // Helper functions to handle fallback URL modal and copy workflows
        function getDirectUrl(url) {
            if (fallbackUrls[url]) {
                return fallbackUrls[url];
            }
            if (url && (url.startsWith('.') || (!url.startsWith('http') && !url.startsWith('blob')))) {
                return new URL(url, window.location.href).href;
            }
            return url || "No link found";
        }

        // Dynamic 100-character breaking logic to keep layout perfectly aligned
        function chunkText(text, size) {
            if (!text) return '';
            const chunks = [];
            for (let i = 0; i < text.length; i += size) {
                chunks.push(text.slice(i, i + size));
            }
            return chunks.map(chunk => `<span class="url-chunk">${chunk}</span>`).join('<br>');
        }

        // Setup modal content
        function showNotWorkingModal() {
            const modal = document.getElementById('not-working-modal');
            const urlText = document.getElementById('modal-url-text');
            const targetUrl = getDirectUrl(currentActiveUrl);
            
            // Re-render URL with exactly 100 character line-breaks
            urlText.innerHTML = chunkText(targetUrl, 100);
            
            modal.classList.remove('hidden');
            // Force reflow for fade transitions
            void modal.offsetWidth;
            modal.classList.add('show');
        }

        function closeNotWorkingModal() {
            const modal = document.getElementById('not-working-modal');
            modal.classList.remove('show');
            setTimeout(() => {
                if (!modal.classList.contains('show')) {
                    modal.classList.add('hidden');
                }
            }, 300);
        }

        function copyModalUrl() {
            const urlText = getDirectUrl(currentActiveUrl);
            const el = document.createElement('textarea');
            el.value = urlText;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            const copyBtn = document.getElementById('copy-btn');
            const originalText = copyBtn.innerText;
            copyBtn.innerText = "Copied!";
            copyBtn.classList.remove('bg-[#00ffff]', 'hover:bg-cyan-300');
            copyBtn.classList.add('bg-green-500', 'hover:bg-green-600', 'text-white');
            
            setTimeout(() => {
                copyBtn.innerText = originalText;
                copyBtn.classList.add('bg-[#00ffff]', 'hover:bg-cyan-300');
                copyBtn.classList.remove('bg-green-500', 'hover:bg-green-600', 'text-white');
            }, 1500);
        }

        function closeAllDropdowns(e) {
            if (!e.target.closest('.game-card')) document.querySelectorAll('.game-card').forEach(c => c.classList.remove('active-dropdown'));
        }

        window.onload = () => {
            const grid = document.getElementById('gridContainer');
            const otherCont = document.getElementById('otherContainer');
            
            // Clear existing elements to resolve duplication glitches
            if (grid) grid.innerHTML = '';
            if (otherCont) otherCont.innerHTML = '';
            
            games.forEach(g => createCard(g, grid));
            other.forEach(o => createCard(o, otherCont));
        };
    </script>
</body>
</html>
